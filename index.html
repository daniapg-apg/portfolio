<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daniela Gomes | Data Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter', sans-serif;
background:#0f172a;
color:white;
line-height:1.6;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 10%;
position:fixed;
width:100%;
background:rgba(15,23,42,0.7);
backdrop-filter:blur(10px);
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:500;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
font-weight:700;
background:linear-gradient(90deg,#60a5fa,#a78bfa);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
font-size:22px;
margin-top:10px;
opacity:0.8;
}

.btn{
margin-top:30px;
padding:14px 28px;
border-radius:30px;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

/* SECTION */

section{
padding:120px 10%;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:16px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
background:#334155;
}

/* METRICS */

.metrics{
display:flex;
gap:60px;
margin-top:40px;
flex-wrap:wrap;
}

.metric h3{
font-size:40px;
color:#818cf8;
}

/* STACK */

.stack{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:30px;
}

.badge{
background:#1e293b;
padding:10px 18px;
border-radius:25px;
font-size:14px;
}

/* FOOTER */

footer{
padding:60px 10%;
text-align:center;
background:#020617;
}

</style>

</head>

<body>

<nav>

<h3>Daniela</h3>

<div>
0
